        .btn-nav { background: var(--red); padding: 10px 20px; font-size: 0.8rem; }
        .stats { display: flex; justify-content: space-between; align-items: center; background: #1a202c; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        .q-text { text-align: left; font-size: 1.25rem; margin-bottom: 25px; color: #fff; line-height: 1.5; }
        .option { display: block; width: 100%; text-align: left; margin: 12px 0; background: #1f2937; border: 1px solid var(--border); padding: 18px; border-radius: 12px; color: var(--text); cursor: pointer; font-size: 1rem; }
        .option.correct { background: var(--green) !important; color: white; border-color: #fff; }
        .option.wrong { background: var(--red) !important; color: white; border-color: #fff; }
        .option.disabled { cursor: default; }
        .review-card { text-align: left; background: #111827; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid var(--red); }
        #quiz-sec, #flash-sec, #res-sec { display: none; }
    </style>
</head>

<header>

        <button onclick="initQuiz(100)">Modo 100 Preguntas</button>

    </div>
</div>

<div class="container" id="quiz-sec">
    <div class="stats">
        <button class="btn-nav" onclick="location.reload()">VOLVER AL INICIO</button>

    <div class="q-text" id="q-display"></div>
    <div id="opts-display"></div>
</div>

<div class="container" id="flash-sec">

</div>

<div class="container" id="res-sec">

// Actualizar texto del botón con el total de preguntas cargadas
document.getElementById('btn-total').innerText = `BANCO COMPLETO (${BANK.length})`;

let pool = []; let cIdx = 0; let score = 0; let fails = []; let flashAns = false;

function shuffle(a) { 
    for (let i = a.length - 1; i > 0; i--) { 
        const j = Math.floor(Math.random() * (i + 1)); 
        [a[i], a[j]] = [a[j], a[i]]; 
    } 
    return a; 
}

function initQuiz(limit) {
    if(BANK.length === 0) { alert("¡Aún no has agregado las preguntas en el código!"); return; }
    pool = shuffle([...BANK]).slice(0, limit);
    cIdx = 0; score = 0; fails = [];
    document.getElementById('menu-sec').style.display = 'none';
    document.getElementById('quiz-sec').style.display = 'block';
    document.getElementById('q-total').innerText = pool.length;
    renderQ();
}

function renderQ() {
    const qData = pool[cIdx];
    document.getElementById('q-idx').innerText = cIdx + 1;
    document.getElementById('q-score').innerText = score;
    document.getElementById('q-display').innerText = qData.q;
    const box = document.getElementById('opts-display'); 
    box.innerHTML = '';
    
    shuffle([...qData.o]).forEach(opt => {
        const b = document.createElement('button'); 
        b.className = 'option'; 
        b.innerText = opt;
        b.onclick = () => {
            const btns = document.querySelectorAll('.option'); 
            btns.forEach(x => x.classList.add('disabled'));
            
            if (opt === qData.a) {
                b.classList.add('correct'); 
                score++; 
                soundOk.play();
            } else {
                b.classList.add('wrong'); 
                soundNo.play();
                fails.push({q: qData.q, a: qData.a});
                btns.forEach(x => { if(x.innerText === qData.a) x.classList.add('correct'); });
            }
            
            setTimeout(() => { 
                cIdx++; 
                if (cIdx < pool.length) renderQ(); 
                else showEnd(); 
            }, 1500);
        };
        box.appendChild(b);
    });
}

function showEnd() {
    document.getElementById('quiz-sec').style.display = 'none';
    document.getElementById('res-sec').style.display = 'block';
    document.getElementById('final-stats').innerText = `${score} / ${pool.length}`;
    const area = document.getElementById('review-area'); 
    area.innerHTML = '<h2 style="text-align:left;">Preguntas para repasar (errores):</h2>';
    
    if(fails.length === 0) {
        area.innerHTML += '<p style="color:var(--green); font-size:1.5rem;">¡Perfecto Kevin! Tienes dominio total.</p>';
    } else {
        fails.forEach(f => { 
            area.innerHTML += `
                <div class="review-card">
                    <div style="color:var(--blue); font-weight:bold; margin-bottom:5px;">P: ${f.q}</div>
                    <div style="color:var(--green); font-weight:bold;">R. CORRECTA: ${f.a}</div>
                </div>`; 
        });
    }
}

function initFlash() {
    if(BANK.length === 0) { alert("¡Agrega las preguntas primero!"); return; }
    document.getElementById('menu-sec').style.display = 'none';
    document.getElementById('flash-sec').style.display = 'block';
    nextFlash();
}

function nextFlash() {
    const q = BANK[Math.floor(Math.random() * BANK.length)];
    const correct = Math.random() > 0.5;
    let dispA = correct ? q.a : (q.o.filter(x => x !== q.a)[0] || "Respuesta incorrecta");
    flashAns = correct;
    document.getElementById('flash-card').innerHTML = `
        <div style="font-size:0.9rem; color:var(--blue); margin-bottom:10px;">PREGUNTA:</div>
        <div>${q.q}</div>
        <hr style="margin:20px 0; border:0; border-top:1px solid var(--border);">
        <div style="font-size:0.9rem; color:var(--blue); margin-bottom:10px;">RESPUESTA PROPUESTA:</div>
        <div style="font-weight:bold">${dispA}</div>
    `;
}

function evalFlash(val) {
    const feedback = document.getElementById('flash-feedback');
    
    // 1. Validar si el usuario acertó
    if (val === flashAns) {
        feedback.innerText = "¡CORRECTO! ✅";
        feedback.style.color = "var(--green)";
        soundOk.play(); // Sonará Swain
    } else {
        feedback.innerText = "INCORRECTO ❌";
        feedback.style.color = "var(--red)";
        soundNo.play(); // Sonará Dr. Mundo
    }

    // 2. Bloquear clics momentáneos para que no salte 100 tarjetas a la vez
    // Esperar 1.5 segundos antes de mostrar la siguiente tarjeta
    setTimeout(() => {
        nextFlash();
    }, 1500); 
}
